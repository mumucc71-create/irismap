<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>장바구니 | IRIS MAPPING LAB</title>
  <link rel="stylesheet" href="site-navigation.css?v=20260623-fantasy-bg-1">
  <style>
    :root{color-scheme:dark;--line:#25495d;--text:#f5f7fa;--muted:#9db0bd;--cyan:#38d9d2;--gold:#e7b74e}
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,#07131c,#030609);color:var(--text);font-family:Arial,"Noto Sans KR",sans-serif}
    .page{width:min(980px,100%);margin:auto;padding:24px}
    .kicker{color:var(--cyan);font-size:12px;font-weight:900;letter-spacing:.08em}
    h1{margin:8px 0 18px;font-size:clamp(30px,5vw,44px)}
    h2,h3,p{margin-top:0}
    p{line-height:1.55}
    .card{margin-top:14px;padding:20px;border:1px solid var(--line);border-radius:8px;background:rgba(9,20,32,.95)}
    .cart-list{display:grid;gap:10px}
    .cart-item{display:grid;grid-template-columns:92px minmax(0,1fr) auto;gap:14px;align-items:center;padding:13px;border:1px solid #31566b;border-radius:8px;background:#08121d}
    .thumb{width:92px;aspect-ratio:1;border:1px solid #31566b;border-radius:7px;background:linear-gradient(145deg,#132435,#060b12);object-fit:cover}
    .thumb.is-camera{position:relative}
    .thumb.is-camera::before{content:"";width:54%;height:54%;position:absolute;left:23%;top:23%;border:5px solid #1b4256;border-radius:50%;background:radial-gradient(circle,#030509 0 29%,#2cc7c6 31% 35%,#07121c 37% 59%,#d6aa4c 61% 64%,#06101a 66%)}
    .item-title{display:block;margin-bottom:6px;font-size:18px}
    .muted{color:var(--muted)}
    .price{color:var(--gold);font-weight:900;white-space:nowrap}
    .item-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}
    .quantity-control{display:inline-grid;grid-template-columns:38px 64px 38px;align-items:center;border:1px solid #31566b;border-radius:6px;overflow:hidden;background:#07111b}
    .quantity-control button{width:38px;min-height:38px;border:0;background:#0c1a28;color:var(--text);font:inherit;font-weight:900;cursor:pointer}
    .quantity-control input{width:64px;min-height:38px;border:0;border-left:1px solid #31566b;border-right:1px solid #31566b;border-radius:0;text-align:center;background:#050b12;color:var(--gold);font-weight:900}
    .button{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:0 15px;border:1px solid var(--cyan);border-radius:6px;background:var(--cyan);color:#061414;font-weight:900;text-decoration:none;cursor:pointer}
    .ghost{background:#07111b;color:var(--text);border-color:#31566b}
    .danger{background:#12090b;color:#ffd8d8;border-color:#6a3440}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .bank{border-color:#755b19;background:linear-gradient(135deg,rgba(231,183,78,.14),rgba(8,18,29,.95))}
    .bank strong{color:var(--gold)}
    .total{display:flex;justify-content:space-between;gap:16px;align-items:center;font-size:22px;font-weight:900}
    .empty{padding:24px;border:1px dashed #31566b;border-radius:8px;color:var(--muted);text-align:center}
    .order-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    label{display:grid;gap:6px;color:#d5e0e6;font-weight:800}
    input,textarea{width:100%;min-height:44px;padding:10px;border:1px solid #31566b;border-radius:6px;background:#07111b;color:var(--text);font:inherit}
    textarea{min-height:86px;resize:vertical}
    .wide{grid-column:1/-1}
    .status{margin:12px 0 0;color:#6ff4e7;font-weight:800}
    @media(max-width:720px){.page{padding:13px}.cart-item{grid-template-columns:70px minmax(0,1fr);align-items:start}.thumb{width:70px}.price{grid-column:1/-1}.total{display:grid;font-size:18px}.order-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<main class="page">
  <span class="kicker">SHOPPING CART</span>
  <h1>장바구니</h1>

  <section class="card">
    <div id="cartList" class="cart-list"></div>
  </section>

  <section class="card total">
    <span>총 상품 금액</span>
    <span id="cartTotal" class="price">0원</span>
  </section>

  <section class="card bank">
    <h2>입금 안내</h2>
    <p>결제 기능은 사용하지 않습니다. 주문 상품을 확인한 뒤 아래 계좌로 입금해 주세요.</p>
    <p><strong>카카오뱅크 3333-04-9698210 이고은</strong></p>
    <p class="muted">아래 주문 알림을 보내면 운영자에게 주문 내용이 이메일과 구글시트로 전달됩니다.</p>
  </section>

  <section class="card">
    <h2>주문 알림 보내기</h2>
    <form id="orderForm">
      <div class="order-grid">
        <label>이름<input name="name" autocomplete="name" required placeholder="이름"></label>
        <label>연락처<input name="phone" autocomplete="tel" required placeholder="전화번호"></label>
        <label>이메일<input name="email" type="email" autocomplete="email" required placeholder="이메일"></label>
        <label class="wide">주소<input name="address" autocomplete="street-address" required placeholder="상품을 받을 주소를 적어주세요"></label>
        <label class="wide">메모<textarea name="memo" placeholder="입금자명, 요청사항 등을 적어주세요"></textarea></label>
      </div>
      <div class="actions"><button class="button" type="submit">주문 알림 보내기</button></div>
    </form>
    <p id="orderStatus" class="status" role="status"></p>
  </section>

  <div class="actions">
    <a class="button ghost" href="shopping.html">쇼핑 계속하기</a>
    <button id="clearCart" class="button danger" type="button">장바구니 비우기</button>
  </div>
</main>

<script>
  const CART_KEY = "irisShoppingCart";
  const ORDER_KEY = "irisShoppingOrders";
  const CUSTOMER_KEY = "irisShoppingOrderCustomer";
  const SCRIPT_URL_KEY = "irisConsultGoogleScriptUrl";
  const DEFAULT_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxSNHb7KjCL6lqu08bCzqFQjeN2B17xj46nQT3LMCZuvUmqiIQZsa8uQswbrJZDzK0/exec";
  const orderScriptUrl = localStorage.getItem(SCRIPT_URL_KEY) || DEFAULT_SCRIPT_URL;
  const orderForm = document.querySelector("#orderForm");

  ensureCartItemIds();
  renderCart();
  restoreOrderCustomer();

  document.querySelector("#clearCart").addEventListener("click", () => {
    localStorage.removeItem(CART_KEY);
    renderCart();
  });

  document.addEventListener("click", (event) => {
    const remove = event.target.closest("[data-remove]");
    const decrease = event.target.closest("[data-qty-decrease]");
    const increase = event.target.closest("[data-qty-increase]");
    if (remove) {
      const cart = readCart().filter((item) => getCartItemId(item) !== remove.dataset.remove);
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
      renderCart();
      return;
    }
    if (decrease || increase) {
      const button = decrease || increase;
      const productId = button.dataset.qtyDecrease || button.dataset.qtyIncrease;
      changeQuantity(productId, decrease ? -1 : 1);
    }
  });

  document.addEventListener("change", (event) => {
    const input = event.target.closest("[data-qty-input]");
    if (!input) return;
    setQuantity(input.dataset.qtyInput, input.value);
  });

  orderForm.addEventListener("submit", async (event) => {
    event.preventDefault();
    const cart = readCart();
    const status = document.querySelector("#orderStatus");
    if (!cart.length) {
      status.textContent = "장바구니에 상품이 없습니다.";
      return;
    }
    const data = Object.fromEntries(new FormData(event.currentTarget).entries());
    saveOrderCustomer(data);
    const order = {
      id: "O" + Date.now(),
      source: "order",
      ...data,
      items: cart,
      total: getTotal(cart),
      status: "접수",
      createdAt: new Date().toISOString(),
      page: location.href
    };
    const orders = readJson(ORDER_KEY, []);
    orders.push(order);
    localStorage.setItem(ORDER_KEY, JSON.stringify(orders));
    const sent = await sendOrder(order);
    status.textContent = sent ? "접수되었습니다." : "전송에 실패했습니다.";
  });

  function restoreOrderCustomer() {
    const saved = readJson(CUSTOMER_KEY, {});
    ["name", "phone", "email", "address", "memo"].forEach((field) => {
      if (saved[field] && orderForm.elements[field]) {
        orderForm.elements[field].value = saved[field];
      }
    });
  }

  function saveOrderCustomer(data) {
    localStorage.setItem(CUSTOMER_KEY, JSON.stringify({
      name: data.name || "",
      phone: data.phone || "",
      email: data.email || "",
      address: data.address || "",
      memo: data.memo || ""
    }));
  }

  function renderCart() {
    const cart = readCart();
    const list = document.querySelector("#cartList");
    if (!cart.length) {
      list.innerHTML = '<div class="empty">장바구니에 담긴 상품이 없습니다.</div>';
      document.querySelector("#cartTotal").textContent = "0원";
      return;
    }
    list.innerHTML = cart.map((item) => `
      <article class="cart-item">
        ${item.imageUrl ? `<img class="thumb" src="${escapeHtml(item.imageUrl)}" alt="${escapeHtml(item.name)}">` : `<div class="thumb is-camera" aria-hidden="true"></div>`}
        <div>
          <strong class="item-title">${escapeHtml(item.name)}</strong>
          <p class="muted">${escapeHtml(item.description || item.reason || "상품 설명이 등록되어 있습니다.")}</p>
          <div class="item-actions">
            <div class="quantity-control" aria-label="수량 조절">
              <button type="button" data-qty-decrease="${escapeHtml(getCartItemId(item))}" aria-label="수량 줄이기">-</button>
              <input type="number" min="1" step="1" value="${Number(item.quantity || 1)}" data-qty-input="${escapeHtml(getCartItemId(item))}" aria-label="수량">
              <button type="button" data-qty-increase="${escapeHtml(getCartItemId(item))}" aria-label="수량 늘리기">+</button>
            </div>
            <button class="button ghost" type="button" data-remove="${escapeHtml(getCartItemId(item))}">삭제</button>
          </div>
        </div>
        <div class="price">${Number(item.salePrice || 0).toLocaleString("ko-KR")}원 × ${Number(item.quantity || 1)}</div>
      </article>`).join("");
    document.querySelector("#cartTotal").textContent = getTotal(cart).toLocaleString("ko-KR") + "원";
  }

  function changeQuantity(cartItemId, delta) {
    const cart = readCart().map((item) => {
      if (getCartItemId(item) !== cartItemId) return item;
      return { ...item, quantity: Math.max(1, Number(item.quantity || 1) + delta) };
    });
    localStorage.setItem(CART_KEY, JSON.stringify(cart));
    renderCart();
  }

  function setQuantity(cartItemId, value) {
    const quantity = Math.max(1, Math.floor(Number(value) || 1));
    const cart = readCart().map((item) => getCartItemId(item) === cartItemId ? { ...item, quantity } : item);
    localStorage.setItem(CART_KEY, JSON.stringify(cart));
    renderCart();
  }

  function ensureCartItemIds() {
    const cart = readCart();
    let changed = false;
    const next = cart.map((item, index) => {
      if (item.productId === "iris-camera" && item.cartItemId !== "CART-iris-camera") {
        changed = true;
        return { ...item, cartItemId: "CART-iris-camera" };
      }
      if (item.cartItemId) return item;
      changed = true;
      return { ...item, cartItemId: makeCartItemId(item, index) };
    });
    if (changed) localStorage.setItem(CART_KEY, JSON.stringify(next));
  }

  function getCartItemId(item) {
    if (item.productId === "iris-camera") return "CART-iris-camera";
    return item.cartItemId || makeCartItemId(item, 0);
  }

  function makeCartItemId(item, index) {
    if (item.productId === "iris-camera") return "CART-iris-camera";
    return "CART-" + String(item.productId || item.name || "item").replace(/[^a-zA-Z0-9가-힣_-]/g, "") + "-" + (item.addedAt || index || Date.now()) + "-" + index;
  }

  async function sendOrder(order) {
    if (!orderScriptUrl) return false;
    const orderItemsText = formatOrderItems(order.items || []);
    const payload = {
      type: "주문",
      name: order.name || "",
      phone: order.phone || "",
      email: order.email || "",
      address: order.address || "",
      orderItemsText,
      total: String(order.total || 0),
      message: order.memo || "",
      page: order.page || location.href,
      createdAt: order.createdAt || new Date().toISOString()
    };
    try {
      const response = await fetch(orderScriptUrl, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });
      const result = await response.json().catch(() => ({}));
      return response.ok && (result.success === true || result.saved === true);
    } catch (_) {
      const failed = readJson("irisShoppingOrderFailedQueue", []);
      failed.push(order);
      localStorage.setItem("irisShoppingOrderFailedQueue", JSON.stringify(failed));
      return false;
    }
  }

  function getTotal(cart) {
    return cart.reduce((sum, item) => sum + Number(item.salePrice || 0) * Number(item.quantity || 1), 0);
  }
  function formatOrderItems(items) {
    return items.map((item) => {
      const name = item.name || "상품명 없음";
      const quantity = Number(item.quantity || 1);
      const price = Number(item.salePrice || 0).toLocaleString("ko-KR") + "원";
      return `${name} / 수량 ${quantity}개 / 가격 ${price}`;
    }).join("\n");
  }
  function readCart() { return readJson(CART_KEY, []); }
  function readJson(key, fallback) { try { return JSON.parse(localStorage.getItem(key) || "null") ?? fallback; } catch (_) { return fallback; } }
  function escapeHtml(value) { return String(value ?? "").replace(/[&<>"']/g, (char) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[char])); }
</script>
<script src="site-navigation.js?v=20260630-marker-sync-1"></script>
</body>
</html>
