<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>회원 맞춤 건강관리 판독 결과</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050711;
      --panel: rgba(12, 17, 31, 0.94);
      --line: rgba(76, 210, 200, 0.24);
      --ink: #f7f4ec;
      --muted: rgba(247, 244, 236, 0.68);
      --accent: #3ad4c7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 0%, rgba(58, 212, 199, 0.16), transparent 26%),
        var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Noto Sans KR", Arial, sans-serif;
    }

    .page {
      display: grid;
      gap: 16px;
      margin: 0 auto;
      max-width: 900px;
      padding: 24px;
    }

    header,
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
    }

    header {
      align-items: center;
      display: flex;
      gap: 16px;
      justify-content: space-between;
      padding: 18px 20px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 28px;
    }

    h2 {
      font-size: 20px;
    }

    .sub {
      color: var(--muted);
      margin-top: 8px;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    button,
    a.button {
      align-items: center;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      cursor: pointer;
      display: inline-flex;
      font: inherit;
      font-weight: 800;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      text-decoration: none;
    }

    .primary {
      background: linear-gradient(135deg, #35d7c6, #7040c9);
      border: 0;
    }

    .result-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .card {
      display: grid;
      gap: 14px;
      padding: 18px;
    }

    .reading-list {
      color: var(--muted);
      display: grid;
      gap: 8px;
      line-height: 1.5;
      margin: 0;
      padding-left: 20px;
    }

    .reading-list strong {
      color: var(--ink);
    }

    .observation-rank {
      border-top: 1px solid var(--line);
      display: grid;
      gap: 8px;
      padding: 14px 0;
    }

    .observation-rank:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .observation-rank h3 {
      color: var(--accent);
      font-size: 17px;
      margin: 0;
    }

    .observation-rank dl {
      display: grid;
      gap: 6px;
      grid-template-columns: 76px 1fr;
      margin: 0;
    }

    .observation-rank dt {
      color: var(--muted);
      font-weight: 700;
    }

    .observation-rank dd {
      line-height: 1.55;
      margin: 0;
    }

    .eye-summary,
    .collarette-note,
    .notice {
      background: rgba(58, 212, 199, 0.06);
      border: 1px solid var(--line);
      border-radius: 8px;
      line-height: 1.65;
      padding: 14px;
    }

    .eye-summary strong,
    .collarette-note strong {
      color: var(--accent);
      display: block;
      margin-bottom: 4px;
    }

    .notice {
      color: var(--muted);
      font-size: 14px;
      grid-column: 1 / -1;
    }

    .combined-card {
      grid-column: 1 / -1;
    }

    .integrated-card {
      border-color: rgba(243, 189, 88, 0.42);
      grid-column: 1 / -1;
    }

    .integrated-intro {
      color: var(--muted);
      line-height: 1.7;
    }

    .source-priority {
      color: #f3bd58;
      font-size: 14px;
      font-weight: 800;
    }

    .integrated-ranking {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .integrated-rank {
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      gap: 9px;
      padding: 14px;
    }

    .integrated-rank h3 {
      color: #f3bd58;
      margin: 0;
    }

    .integrated-rank dl {
      display: grid;
      gap: 6px;
      grid-template-columns: 88px 1fr;
      margin: 0;
    }

    .integrated-rank dt {
      color: var(--muted);
      font-weight: 700;
    }

    .integrated-rank dd {
      line-height: 1.5;
      margin: 0;
    }

    .confidence-line {
      background: rgba(58, 212, 199, 0.08);
      border-radius: 7px;
      color: var(--muted);
      padding: 10px 12px;
    }

    .family-reference {
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid rgba(158, 176, 189, 0.28);
      border-radius: 8px;
      margin-top: 14px;
      padding: 15px;
    }

    .family-reference h3 {
      color: var(--muted);
      margin: 0 0 8px;
    }

    .family-reference ul {
      margin: 8px 0;
    }

    .combined-result {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .combined-result > p {
      margin: 0;
    }

    .priority-card {
      border-color: rgba(243, 189, 88, 0.48);
      grid-column: 1 / -1;
    }

    .priority-groups {
      display: grid;
      gap: 12px;
    }

    .priority-group {
      background: rgba(255, 255, 255, 0.028);
      border: 1px solid rgba(243, 189, 88, 0.24);
      border-radius: 10px;
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .priority-group h3 {
      color: #f3bd58;
      font-size: 18px;
      margin: 0;
    }

    .priority-item {
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: grid;
      gap: 8px;
      padding-top: 10px;
    }

    .priority-item:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .priority-item strong {
      color: var(--ink);
      font-size: 16px;
    }

    .priority-meta {
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      line-height: 1.5;
    }

    .priority-chip {
      background: rgba(58, 212, 199, 0.08);
      border: 1px solid rgba(58, 212, 199, 0.24);
      border-radius: 999px;
      color: #d7fffb;
      font-size: 13px;
      padding: 4px 8px;
    }

    .priority-warning {
      border-color: rgba(243, 189, 88, 0.36);
      color: #f4d48a;
      line-height: 1.65;
    }

    .empty {
      color: var(--muted);
      padding: 18px 0;
    }

    @media (max-width: 640px) {
      .page {
        padding: 10px;
      }

      header {
        align-items: stretch;
        flex-direction: column;
      }

      .actions,
      .actions > * {
        width: 100%;
      }

      .combined-result {
        grid-template-columns: 1fr;
      }

      .integrated-ranking {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <link rel="stylesheet" href="site-navigation.css?v=20260623-fantasy-bg-1">
</head>
<body>
  <main class="page">
    <header>
      <div>
        <h1>판독 결과</h1>
        <p id="createdAt" class="sub">판독 결과를 불러오는 중입니다.</p>
      </div>
      <div class="actions">
        <a class="button" href="iris.html">홍채촬영</a>
        <a class="button" href="final-report.html">최종 판독</a>
        <a class="button" href="index.html">메인 화면</a>
        <button class="primary" type="button" onclick="window.print()">저장/인쇄</button>
      </div>
    </header>

    <section class="result-grid">
      <article class="card priority-card">
        <h2>판독결과</h2>
        <div id="managementPriorityResults"></div>
      </article>

      <article class="card combined-card">
        <h2>좌우 홍채 종합</h2>
        <div class="combined-result">
          <p id="combinedSummary" class="eye-summary"></p>
          <p id="combinedCollarette" class="collarette-note"></p>
        </div>
      </article>
      
      <article class="card">
        <h2>우안 관찰 결과</h2>
        <div id="rightResults"></div>
      </article>
      <article class="card">
        <h2>좌안 관찰 결과</h2>
        <div id="leftResults"></div>
      </article>
      
    </section>
  </main>

  <script src="integrated-reading-engine.js"></script>
  <script>
    const raw = localStorage.getItem("irisReadingResult");
    const data = raw ? JSON.parse(raw) : null;
    const sessionPhone = localStorage.getItem("irisMappingSession") || "";
    const integratedData = window.IrisIntegratedReadingEngine?.analyze(sessionPhone);

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (character) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      })[character]);
    }

    function observationConsultation(item) {
      return String(item?.consultation || "")
        .replace("어릴 때부터 이어진 체질적 경향으로 참고됩니다.", "동공에 가까운 관찰 위치입니다. 발생 시점은 실제 문진과 병력 기록을 우선하여 확인합니다.")
        .replace("성장 후 생활습관이나 환경 영향으로 참고됩니다.", "홍채 바깥쪽 관찰 위치입니다. 발생 원인은 문진과 실제 병력 기록을 함께 확인합니다.");
    }

    function renderReadingList(results) {
      if (!results || results.length === 0) {
        return '<p class="empty">판독 결과가 없습니다.</p>';
      }

      return `
        <div class="observation-list">
          ${results.map((item, index) => `
            <section class="observation-rank">
              <h3>${index + 1}순위</h3>
              <dl>
                <dt>영역코드</dt><dd>${escapeHtml(item.code)}</dd>
                <dt>부위</dt><dd>${escapeHtml(item.area)}</dd>
                <dt>패턴</dt><dd>${escapeHtml(item.type || "")}</dd>
                <dt>위치</dt><dd>${escapeHtml(item.clockTime || "")}</dd>
                <dt>반경</dt><dd>${escapeHtml(item.radiusPercent ?? "")}%</dd>
                <dt>강도</dt><dd>${escapeHtml(item.strength || "중")}</dd>
              </dl>
            </section>
          `).join("")}
        </div>
      `;
    }

    function renderIntegratedResults(result) {
      const target = document.querySelector("#integratedResults");
      if (!target) return;
      if (!result || !result.results?.length) {
        target.innerHTML = '<p class="empty">종합할 문진·병력·홍채 결과가 없습니다. 먼저 라이프케어진단을 저장해 주세요.</p><a class="button" href="health.html">라이프케어진단 작성하기</a>';
        return;
      }

      const questionnaireNotice = result.hasQuestionnaire
        ? ""
        : '<p class="notice">저장된 문진이 없어 현재 결과의 신뢰도가 낮습니다. 홍채 후보만으로 건강 부위를 단정하지 않습니다.</p>';
      const ranks = result.results.map((group, index) => {
        const selected = group.selected;
        const currentQuestionnaire = selected.currentQuestionnaireMatches || selected.questionnaireMatches || [];
        const questionnaire = currentQuestionnaire.length
          ? currentQuestionnaire.slice(0, 5).map((item) => item.label).join(", ")
          : "일치하는 주의 응답 없음";
        const pastHealth = selected.pastHealthMatches?.length
          ? selected.pastHealthMatches.slice(0, 4).map((item) => `${item.label}(${Array.isArray(item.value) ? item.value.join(", ") : item.value})`).join(", ")
          : "관련 과거 치료 이력 없음";
        const history = selected.historyMatches?.length
          ? selected.historyMatches.slice(0, 4).map((item) => item.name || item.area).filter(Boolean).join(", ")
          : "일치 병력 없음";
        return `
          <section class="integrated-rank">
            <h3>${index + 1}순위 · ${escapeHtml(selected.name)}</h3>
            <dl>
              <dt>후보 영역</dt><dd>${escapeHtml(group.candidateAreas.join(" / "))}</dd>
              <dt>현재 문진</dt><dd>${escapeHtml(questionnaire)}</dd>
              <dt>과거 치료 이력</dt><dd>${escapeHtml(pastHealth)}</dd>
              <dt>병력 일치</dt><dd>${escapeHtml(history)}</dd>
              <dt>관리 우선도</dt><dd>${escapeHtml(selected.managementPriority)}</dd>
              <dt>종합 설명</dt><dd>${escapeHtml(group.consultation)}</dd>
            </dl>
          </section>`;
      }).join("");
      const confidence = result.confidence || {};
      const questionnaireConfidence = Number.isFinite(confidence.irisQuestionnaire)
        ? `${confidence.irisQuestionnaire}%`
        : "확인 불가";
      const overallConfidence = Number.isFinite(confidence.overall)
        ? `${confidence.overall}%`
        : "확인 불가";
      const additional = result.additionalResults?.length
        ? `<p class="confidence-line"><strong>추가 관리 참고 영역:</strong> ${escapeHtml(result.additionalResults.map((group) => `${group.selected.name}(${group.selected.managementPriority})`).join(", "))}</p>`
        : "";
      const familyItems = result.familyReferences || [];
      const corroboratedFamily = result.results.flatMap((group) => group.selected.familyMatches || []);
      const familyReference = familyItems.length
        ? `<section class="family-reference"><h3>가족력 참고</h3><ul>${familyItems.slice(0, 6).map((item) => `<li>${escapeHtml(item.label)}: ${escapeHtml(Array.isArray(item.value) ? item.value.join(", ") : item.value)}</li>`).join("")}</ul><p>${corroboratedFamily.length ? "현재 본인의 문진·병력·홍채 중 다른 근거와 함께 확인된 항목만 참고사항으로 표시했습니다. 가족력 자체는 점수와 우선순위를 올리지 않습니다." : "현재 본인 증상과 직접 연결되는 항목은 확인되지 않았습니다. 가족력은 점수와 우선순위에 반영하지 않았습니다."}</p></section>`
        : "";
      target.innerHTML = `
        <p class="confidence-line">문진 일치도 ${questionnaireConfidence} · 종합 신뢰도 ${overallConfidence} (${escapeHtml(confidence.overallLabel || "낮음")})</p>
        ${questionnaireNotice}
        <div class="integrated-ranking">${ranks}</div>
        ${additional}
        ${familyReference}`;
    }

    const priorityLevels = [
      { key: "critical", title: "⭐⭐⭐⭐⭐ 5년 이상 지속" },
      { key: "focused", title: "⭐⭐⭐⭐ 현재 치료·복용 중" },
      { key: "managed", title: "⭐⭐⭐ 홍채·라이프진단·유니버스 일치" },
      { key: "interest", title: "⭐⭐ 홍채와 1개 자료 일치" },
      { key: "observe", title: "⭐ 홍채 관찰만" }
    ];

    const areaRules = [
      { area: "뇌·신경", keywords: ["뇌", "신경", "자율신경", "감각", "소뇌", "변연계", "뇌간", "시상하부", "수면", "두통", "편두통", "불안", "집중"] },
      { area: "심장·순환", keywords: ["심장", "순환", "혈액", "혈압", "가슴", "두근", "판막"] },
      { area: "간·담낭", keywords: ["간", "담낭", "담도", "피로", "간수치"] },
      { area: "위·소화기", keywords: ["위", "유문", "소화", "속쓰림", "역류", "췌장", "구토"] },
      { area: "장·소장", keywords: ["장", "소장", "대장", "결장", "변비", "설사", "가스", "복부"] },
      { area: "신장·비뇨", keywords: ["신장", "요관", "방광", "비뇨", "소변", "요로", "옆구리"] },
      { area: "생식·골반", keywords: ["생식", "골반", "자궁", "난소", "전립선", "질", "분비물", "하복부"] },
      { area: "폐·기관지", keywords: ["폐", "기관지", "호흡", "기침", "가래", "숨참", "천식", "비염"] },
      { area: "목·갑상선·어깨", keywords: ["목", "갑상선", "어깨", "편도", "림프", "경추"] },
      { area: "피부·면역", keywords: ["피부", "면역", "염증", "감염", "알레르기", "비듬", "탈모"] },
      { area: "구강·치주", keywords: ["구강", "치주", "잇몸", "치아", "충치", "입안", "입 냄새"] }
    ];

    function readJson(key) {
      try { return JSON.parse(localStorage.getItem(key) || "null"); } catch (_) { return null; }
    }

    function storageText(matcher) {
      return Object.keys(localStorage)
        .filter((key) => matcher.test(key))
        .map((key) => `${key} ${localStorage.getItem(key) || ""}`)
        .join(" ");
    }

    function compactText(value) {
      try { return JSON.stringify(value || ""); } catch (_) { return String(value || ""); }
    }

    function normalizePhone(value) {
      let digits = String(value || "").replace(/\D/g, "");
      if (digits.length === 10 && digits.startsWith("10")) digits = `0${digits}`;
      return digits;
    }

    function meaningfulAnswer(value) {
      const neutral = new Set(["", "아니오", "전혀 아니다", "없음", "해당 없음", "정상", "모름", "미기록", "아니요"]);
      const values = Array.isArray(value) ? value : [value];
      return values.some((item) => !neutral.has(String(item ?? "").trim()));
    }

    function collectHealthEvidenceText(phoneValue) {
      const phone = normalizePhone(phoneValue);
      const keys = Object.keys(localStorage).filter((key) => key === `irisHealthTest:${phone}` || key.startsWith("irisHealthTest:"));
      return keys.map((key) => readJson(key)).filter(Boolean).flatMap((health) => {
        const labels = health.answerLabels || {};
        return Object.entries(health).flatMap(([group, answers]) => {
          if (!answers || typeof answers !== "object" || Array.isArray(answers) || group === "answerLabels") return [];
          return Object.entries(answers)
            .filter(([, value]) => meaningfulAnswer(value))
            .map(([name, value]) => `${labels[name] || name} ${Array.isArray(value) ? value.join(" ") : value}`);
        });
      }).join(" ");
    }

    function collectUniverseEvidenceText(phoneValue) {
      const phone = normalizePhone(phoneValue);
      const keys = Object.keys(localStorage).filter((key) => key === `UniverseReportDB:${phone}` || key === "UniverseReportDB" || key.startsWith("UniverseReportDB:"));
      return keys.map((key) => extractUniverseEvidenceTerms(readJson(key)).join(" ")).join(" ");
    }

    function collectUniverseDetailText(phoneValue) {
      const phone = normalizePhone(phoneValue);
      const keys = Object.keys(localStorage).filter((key) => key === `UniverseReportDB:${phone}` || key === "UniverseReportDB" || key.startsWith("UniverseReportDB:"));
      return keys.map((key) => extractUniverseEvidenceDetails(readJson(key)).join(" ")).join(" ");
    }

    function extractUniverseEvidenceTerms(value, bucket = []) {
      if (!value) return bucket;
      if (Array.isArray(value)) {
        value.forEach((item) => extractUniverseEvidenceTerms(item, bucket));
        return bucket;
      }
      if (typeof value !== "object") return bucket;
      const score = Number(value.score ?? value.percent ?? value.risk ?? value.value);
      const name = value.name || value.area || value.bodyPart || value.part || value.부위 || value.영역;
      if (name && Number.isFinite(score) && score >= 41) bucket.push(String(name));
      Object.entries(value).forEach(([key, item]) => {
        if (/text|raw|추출텍스트|PDF파일URL|파일/i.test(key)) return;
        extractUniverseEvidenceTerms(item, bucket);
      });
      return bucket;
    }

    function extractUniverseEvidenceDetails(value, bucket = []) {
      if (!value) return bucket;
      if (Array.isArray(value)) {
        value.forEach((item) => extractUniverseEvidenceDetails(item, bucket));
        return bucket;
      }
      if (typeof value !== "object") return bucket;
      const score = Number(value.score ?? value.percent ?? value.risk ?? value.value);
      const name = value.name || value.area || value.bodyPart || value.part || value.부위 || value.영역;
      if (name && Number.isFinite(score) && score >= 41) bucket.push(compactText(value));
      Object.entries(value).forEach(([key, item]) => {
        if (/text|raw|추출텍스트|PDF파일URL|파일/i.test(key)) return;
        extractUniverseEvidenceDetails(item, bucket);
      });
      return bucket;
    }

    function directEvidenceKeywords(entry) {
      const raw = [
        entry.area,
        entry.item?.area,
        entry.item?.organ,
        entry.item?.code,
        ...(entry.rule?.keywords || [])
      ].filter(Boolean);
      return [...new Set(raw.flatMap((text) => String(text).split(/[·,/()\s]+/)).map((text) => text.trim()).filter((text) => text.length >= 2))];
    }

    function hasDirectEvidence(text, entry) {
      if (!text) return false;
      return directEvidenceKeywords(entry).some((keyword) => text.includes(keyword));
    }

    function hasTreatmentEvidence(text, entry) {
      if (!hasDirectEvidence(text, entry)) return false;
      return /(현재\s*(치료|관리|복용)|치료\s*중|관리\s*중|복용\s*중|약을\s*먹|약\s*복용|투약|처방|완치\s*안|재발|현재\s*불편|현재\s*있음)/.test(text);
    }

    function hasFiveYearEvidence(text, entry) {
      if (!hasDirectEvidence(text, entry)) return false;
      return /(5년\s*이상|5년\s*넘|6년|7년|8년|9년|10년|장기간|오랫동안)/.test(text);
    }

    function areaRuleFor(text, code) {
      const source = `${text || ""} ${code || ""}`;
      const hour = Number(String(code || "").split("-")[0]);
      if (hour === 12 || hour === 11) return areaRules[0];
      if (hour === 9) return areaRules[1];
      if (hour === 7) return areaRules[2];
      if (hour === 4) return areaRules[3];
      if (hour === 8) return areaRules[4];
      if (hour === 5) return areaRules[5];
      if (hour === 6) return areaRules[6];
      if (hour === 2 || hour === 3) return areaRules[7];
      if (hour === 10) return areaRules[8];
      return areaRules.find((rule) => rule.keywords.some((keyword) => source.includes(keyword))) || { area: text || code || "관찰 영역", keywords: [text || code || ""] };
    }

    function hasAreaEvidence(text, rule) {
      return Boolean(text && rule?.keywords?.some((keyword) => keyword && text.includes(keyword)));
    }

    function collectIrisObservationItems(reading) {
      const source = [
        ...(reading?.manualObservations?.right || []).map((item) => ({ ...item, eyeLabel: "우안" })),
        ...(reading?.manualObservations?.left || []).map((item) => ({ ...item, eyeLabel: "좌안" }))
      ];
      return source.map((item, index) => {
        const rule = areaRuleFor(item.area || item.organ || item.code, item.code);
        return {
          area: item.area || item.organ || rule.area || item.code || "관찰 영역",
          rule,
          item,
          index,
          score: Number(item.priorityScore || item.score || 1)
        };
      }).sort((a, b) => b.score - a.score || a.index - b.index);
    }

    function classifyPriority(entry, evidence) {
      const lifeMatch = hasDirectEvidence(evidence.lifeText, entry);
      const universeMatch = hasDirectEvidence(evidence.universeText, entry);
      const allThree = lifeMatch && universeMatch;
      const detailText = `${evidence.lifeText} ${evidence.universeDetailText}`;
      let stars = 1;
      if (lifeMatch || universeMatch) stars = 2;
      if (allThree) stars = 3;
      if (allThree && hasTreatmentEvidence(detailText, entry)) stars = 4;
      if (allThree && hasFiveYearEvidence(detailText, entry)) stars = 5;
      const level = stars === 5 ? "critical" : stars === 4 ? "focused" : stars === 3 ? "managed" : stars === 2 ? "interest" : "observe";
      return {
        ...entry,
        level,
        stars,
        lifeMatch,
        universeMatch
      };
    }

    function starText(count) {
      return "★".repeat(count) + "☆".repeat(Math.max(0, 5 - count));
    }

    function renderManagementPriority(reading, integrated) {
      const target = document.querySelector("#managementPriorityResults");
      if (!target) return;
      const observations = collectIrisObservationItems(reading);
      if (!observations.length) {
        target.innerHTML = '<p class="empty">아직 등록된 홍채 관찰 기록이 없습니다. 홍채촬영 화면에서 점·선·함몰 등을 직접 표시한 뒤 판독하기를 눌러주세요.</p>';
        return;
      }
      const accountPhone = localStorage.getItem("irisMappingSession") || reading?.accountPhone || "";
      const evidence = {
        lifeText: collectHealthEvidenceText(accountPhone),
        universeText: collectUniverseEvidenceText(accountPhone),
        universeDetailText: collectUniverseDetailText(accountPhone)
      };
      const classified = observations.map((entry) => classifyPriority(entry, evidence));
      const sections = priorityLevels.map((level) => {
        const items = classified.filter((item) => item.level === level.key);
        if (!items.length) return "";
        return `
          <section class="priority-group">
            <h3>${level.title}</h3>
            ${items.map((item) => `
              <div class="priority-item">
                <strong>${escapeHtml(item.area)} <span class="priority-chip">${starText(item.stars)}</span></strong>
                <div class="priority-meta">
                  <span class="priority-chip">${escapeHtml(item.item.eyeLabel || "")}</span>
                  <span class="priority-chip">${escapeHtml(item.item.clockTime || "")}</span>
                  <span class="priority-chip">${escapeHtml(item.item.code || "")}</span>
                  <span class="priority-chip">${escapeHtml(item.item.type || "")}</span>
                  <span class="priority-chip">${escapeHtml(item.item.strength || "중")}</span>
                </div>
              </div>
            `).join("")}
          </section>`;
      }).join("");
      target.innerHTML = `<div class="priority-groups">${sections || '<p class="empty">수동으로 체크한 홍채 관찰 기록이 없습니다.</p>'}</div>`;
    }

    function combineEyeAreas(rightResults, leftResults) {
      const grouped = new Map();
      [["우안", rightResults], ["좌안", leftResults]].forEach(([eyeLabel, results]) => {
        (results || []).forEach((item) => {
          const key = item.area || item.code;
          if (!grouped.has(key)) grouped.set(key, { area: key, points: 0, confidence: 0, eyes: new Set() });
          const group = grouped.get(key);
          group.points += Number(item.priorityScore) || 0;
          group.confidence = Math.max(group.confidence, Number(item.score) || 0);
          group.eyes.add(eyeLabel);
        });
      });

      return [...grouped.values()]
        .map((group) => ({ ...group, combinedScore: group.points + group.eyes.size * 2 + group.confidence / 100 }))
        .sort((a, b) => b.combinedScore - a.combinedScore)
        .slice(0, 3);
    }

    function buildCombinedSummary(rightResults, leftResults) {
      const ranking = combineEyeAreas(rightResults, leftResults);
      if (!ranking.length) return "좌우 홍채에서 종합할 우선 영역이 없습니다.";
      if (ranking.length === 1) return `좌우 홍채를 함께 보면 ${ranking[0].area} 관련 영역이 가장 먼저 보입니다.`;
      if (ranking.length === 2) return `좌우 홍채를 함께 보면 ${ranking[0].area} 관련 영역이 가장 먼저 보이고, 그다음 ${ranking[1].area} 관련 영역이 체크됩니다.`;
      return `좌우 홍채를 함께 보면 ${ranking[0].area} 관련 영역이 가장 먼저 보이고, 그다음 ${ranking[1].area}, ${ranking[2].area} 관련 영역 순서로 체크됩니다. ${ranking[2].area} 관련 영역은 참고 수준으로 보입니다.`;
    }

    function buildCombinedCollarette(collarette) {
      const observations = [
        ["우안", collarette?.right],
        ["좌안", collarette?.left]
      ].filter(([, value]) => value && Number.isFinite(Number(value.radialPercent)));

      if (!observations.length) return "좌우 홍채에서 꽃모양 영역을 안정적으로 확인하지 못했습니다.";

      const average = Math.round(observations.reduce((sum, [, value]) => sum + Number(value.radialPercent), 0) / observations.length);
      const size = average < 29 ? "작게" : average > 44 ? "넓게" : "보통 범위로";
      const interpretation = average < 29
        ? "전통 홍채학에서는 기본 체력과 소화력이 약한 쪽의 참고 신호로 봅니다."
        : average > 44
          ? "전통 홍채학에서는 기본 체력과 소화력이 안정적인 쪽의 참고 신호로 봅니다."
          : "전통 홍채학에서는 기본 체력과 소화 상태가 보통 범위인 참고 신호로 봅니다.";
      const detail = observations.map(([label, value]) => `${label} ${Math.round(Number(value.radialPercent))}%`).join(", ");
      const values = observations.map(([, value]) => Number(value.radialPercent));
      const differenceNote = values.length === 2 && Math.abs(values[0] - values[1]) >= 10
        ? " 좌우 차이가 있어 촬영 각도와 조명 영향도 함께 확인합니다."
        : "";

      return `좌우 홍채를 함께 보면 동공 바깥 꽃모양 영역은 평균 ${average}%로 ${size} 관찰됩니다. (${detail}) ${interpretation}${differenceNote}`;
    }

    renderIntegratedResults(integratedData);

    if (!data) {
      document.querySelector("#createdAt").textContent = "저장된 판독 결과가 없습니다.";
      document.querySelector("#rightResults").innerHTML = '<p class="empty">결과 없음</p>';
      document.querySelector("#leftResults").innerHTML = '<p class="empty">결과 없음</p>';
      renderManagementPriority(null, integratedData);
      document.querySelector("#combinedSummary").innerHTML = "<strong>홍채 후보 요약</strong>저장된 결과가 없습니다.";
      document.querySelector("#combinedCollarette").innerHTML = "<strong>동공 바깥 꽃모양 영역</strong>저장된 결과가 없습니다.";
    } else {
      document.querySelector("#createdAt").textContent = `판독일시 ${new Date(data.createdAt).toLocaleString("ko-KR")}`;
      renderManagementPriority(data, integratedData);
      document.querySelector("#rightResults").innerHTML = renderReadingList(data.right);
      document.querySelector("#leftResults").innerHTML = renderReadingList(data.left);
      document.querySelector("#combinedSummary").innerHTML = `<strong>홍채 후보 요약</strong>${escapeHtml(buildCombinedSummary(data.right, data.left))}`;
      document.querySelector("#combinedCollarette").innerHTML = `<strong>동공 바깥 꽃모양 영역</strong>${escapeHtml(buildCombinedCollarette(data.collarette))}`;
    }
  </script>
