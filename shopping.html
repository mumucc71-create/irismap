<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>쇼핑하기 | IRIS MAPPING LAB</title>
  <link rel="stylesheet" href="site-navigation.css?v=20260623-fantasy-bg-1">
  <style>
    :root { color-scheme:dark; --bg:#05090f; --panel:#0a1420; --line:#25495d; --text:#f5f7fa; --muted:#9db0bd; --cyan:#38d9d2; --gold:#e7b74e; }
    * { box-sizing:border-box; }
    body { margin:0; background:linear-gradient(180deg,#07131c,#030609); color:var(--text); font-family:Arial,"Noto Sans KR",sans-serif; }
    .page { width:min(1120px,100%); margin:auto; padding:24px; }
  
    .brand,.kicker { color:var(--cyan); font-size:12px; font-weight:800; letter-spacing:.08em; }
    h1 { margin:7px 0 0; font-size:clamp(30px,5vw,44px); }
    h2,h3,p { margin-top:0; }
    p { line-height:1.55; }
    .muted { color:var(--muted); }
    .card { margin-top:15px; padding:21px; border:1px solid var(--line); border-radius:8px; background:rgba(9,20,32,.96); }
    .chips { display:flex; flex-wrap:wrap; gap:8px; }
    .chip { padding:9px 12px; border:1px solid #327084; border-radius:6px; background:#08131e; }
    .goal-chip { color:var(--text); cursor:pointer; font:inherit; transition:.2s ease; }
    .goal-chip:hover,.goal-chip.is-active { color:#061414; border-color:var(--cyan); background:var(--cyan); box-shadow:0 0 18px rgba(56,217,210,.25); }
    .ingredient-list { display:grid; gap:12px; }
    .ingredient-row { display:grid; grid-template-columns:minmax(160px,230px) 1fr; gap:16px; align-items:center; padding:15px; border:1px solid #31566b; border-radius:8px; background:#08121d; }
    .ingredient-row h3 { margin:0 0 6px; color:var(--gold); font-size:21px; }
    .product-picks { display:flex; justify-content:flex-end; gap:10px; min-width:0; }
    .product-pick { width:min(180px,48%); color:var(--text); text-decoration:none; }
    .product-pick img { width:100%; aspect-ratio:4/3; display:block; object-fit:cover; border:1px solid #31566b; border-radius:7px; background:#020508; }
    .product-pick span { display:block; margin-top:6px; font-size:13px; text-align:center; }
    .product-pick .product-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:800; }
    .product-pick .product-reason { color:var(--muted); font-size:12px; line-height:1.45; white-space:normal; }
    .ingredient-reason { margin:7px 0 0; color:#d9e5e9; font-size:14px; }
    .reason-label { color:var(--cyan); font-weight:850; }
    .product-empty { color:var(--muted); text-align:right; }
    .camera { display:grid; grid-template-columns:160px 1fr auto; gap:18px; align-items:center; }
    .camera-visual { width:150px; height:112px; position:relative; border:1px solid #3b6c7e; border-radius:8px; background:linear-gradient(145deg,#132435,#060b12); }
    .camera-visual::before { content:""; width:62px; height:62px; position:absolute; left:44px; top:25px; border:8px solid #1b4256; border-radius:50%; background:radial-gradient(circle,#030509 0 29%,#2cc7c6 31% 35%,#07121c 37% 59%,#d6aa4c 61% 64%,#06101a 66%); }
    .price { color:var(--gold); font-size:25px; font-weight:850; white-space:nowrap; }
    .consult-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:11px; }
    label { display:grid; gap:6px; color:#c9d6dd; font-weight:700; }
    input, textarea { width:100%; min-height:44px; padding:10px; border:1px solid #31566b; border-radius:6px; background:#07111b; color:var(--text); font:inherit; }
    textarea { min-height:108px; resize:vertical; }
    .consult-grid .wide { grid-column:1/-1; }
    .button { display:inline-flex; align-items:center; justify-content:center; min-height:42px; padding:0 15px; border:1px solid var(--cyan); border-radius:6px; background:var(--cyan); color:#061414; font-weight:850; text-decoration:none; cursor:pointer; }
    .consult-actions { margin-top:12px; }
    .status { margin:10px 0 0; color:var(--cyan); }
    .shop-table { display:grid; gap:8px; }
    .shop-head,.shop-row { display:grid; grid-template-columns:minmax(0,1.25fr) minmax(0,1.5fr) minmax(82px,.55fr) minmax(86px,.5fr); gap:14px; align-items:center; min-width:0; }
    .shop-head { padding:0 14px; color:var(--muted); font-size:12px; font-weight:850; }
    .shop-row { padding:13px; border:1px solid #31566b; border-radius:8px; background:#08121d; }
    .shop-row > * { min-width:0; }
    .shop-row .button { width:100%; min-width:0; padding-inline:10px; }
    .shop-product { display:grid; grid-template-columns:clamp(58px,12vw,82px) minmax(0,1fr); gap:12px; align-items:center; min-width:0; }
    .shop-product img,.shop-camera-visual,.shop-placeholder { width:100%; height:auto; aspect-ratio:82/66; object-fit:cover; border:1px solid #31566b; border-radius:7px; background:#020508; }
    .shop-placeholder { display:grid; place-items:center; color:var(--cyan); font-size:11px; font-weight:900; text-align:center; background:radial-gradient(circle at 50% 50%,#102a3a,#020508 70%); }
    .shop-product strong { display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .shop-reason { color:#d9e5e9; font-size:14px; line-height:1.5; overflow-wrap:anywhere; }
    .shop-price { color:var(--gold); font-weight:850; white-space:nowrap; }
    .shop-camera-visual { position:relative; background:linear-gradient(145deg,#132435,#060b12); }
    .shop-camera-visual::before { content:""; width:48%; height:60%; position:absolute; left:24%; top:18%; border:clamp(3px,.8vw,5px) solid #1b4256; border-radius:50%; background:radial-gradient(circle,#030509 0 29%,#2cc7c6 31% 35%,#07121c 37% 59%,#d6aa4c 61% 64%,#06101a 66%); }
    .empty-products { padding:18px; border:1px dashed #31566b; border-radius:7px; color:var(--muted); text-align:center; }
    @media(max-width:820px) { .page{padding:13px}.ingredient-row,.camera{grid-template-columns:1fr}.product-picks{justify-content:flex-start}.product-empty{text-align:left}.consult-grid{grid-template-columns:1fr}.camera .price{white-space:normal}.shop-head{display:none}.shop-row{grid-template-columns:minmax(0,1fr);gap:10px;align-items:stretch}.shop-row .button{width:100%}.shop-row::before{content:none}.shop-price::before{content:"가격  ";color:var(--muted);font-weight:700}.shop-reason::before{content:"이유  ";color:var(--cyan);font-weight:800} }
  </style>
</head>
<body>
<main class="page">
  <header class="hero"></header>

  <section class="card">
    <span class="kicker">CARE GOALS</span>
    <h2>추천 관리 목적</h2>
    <div id="careGoals" class="chips"></div>
  </section>

  <section class="card"><span class="kicker">BASIC</span><h2>기본 필수</h2><div id="basicProducts" class="shop-table"></div></section>
  <section class="card"><span class="kicker">PERSONAL</span><h2>개인별 필수</h2><div id="personalProducts" class="shop-table"></div></section>
  <section class="card"><span class="kicker">PREFERENCE</span><h2>기호식품</h2><div id="preferenceProducts" class="shop-table"></div></section>

  <section class="card" id="consultation">
    <span class="kicker">CONSULTATION</span>
    <h2>상담요청</h2>
    <form id="consultForm">
      <div class="consult-grid">
        <label>이름<input name="name" required autocomplete="name"></label>
        <label>연락처<input name="phone" required autocomplete="tel" inputmode="tel"></label>
        <label>이메일<input name="email" type="email" autocomplete="email" placeholder="이메일"></label>
        <label class="wide">문의내용<textarea name="memo" required placeholder="문의하실 내용을 적어주세요"></textarea></label>
      </div>
      <div class="consult-actions"><button class="button" type="submit">상담 요청 올리기</button></div>
    </form>
    <p id="consultStatus" class="status" role="status"></p>
  </section>
</main>

<script src="care-engine.js"></script>
<script src="shopping-recommendation-db.js"></script>
<script>
  const analysis = window.IrisCareEngine?.analyze?.() || { primary: [] };
  const productDb = window.ProductDB;
  const products = productDb?.read?.() || [];
  const operatorSettings = readJson("irisShoppingOperatorSettings", { ingredientReasons:{}, camera:{} });
  const CONSULT_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxSNHb7KjCL6lqu08bCzqFQjeN2B17xj46nQT3LMCZuvUmqiIQZsa8uQswbrJZDzK0/exec";
  const consultScriptUrl = localStorage.getItem("irisConsultGoogleScriptUrl") || CONSULT_SCRIPT_URL;
  const consultForm = document.querySelector("#consultForm");
  const primary = Array.isArray(analysis.primary) ? analysis.primary : [];
  const goalOptions = [];
  primary.forEach((item) => {
    (item.goals || []).forEach((label) => {
      if (!goalOptions.some((option) => option.label === label)) {
        goalOptions.push({ label, ingredients:item.ingredients || [] });
      }
    });
  });
  const goals = goalOptions.map((option) => option.label).slice(0, 8);
  const ingredients = unique(primary.flatMap((item) => item.ingredients || [])).slice(0, 8);

  document.querySelector("#careGoals").innerHTML = goals.length
    ? goalOptions.slice(0, 8).map((option, index) => '<button type="button" class="chip goal-chip" data-goal-index="' + index + '">✓ ' + escapeHtml(option.label) + '</button>').join("")
    : '<span class="muted">라이프진단과 총결과를 완료하면 관리 목적이 표시됩니다.</span>';

  const camera = operatorSettings.camera || {};
  const availableProducts = products.filter((product) => product.visible !== false).sort((a,b) => Number(a.priority || 100) - Number(b.priority || 100));
  const basic = availableProducts.filter((product) => product.displayGroup === "basic");
  const personal = availableProducts.filter((product) => product.displayGroup === "personal");
  const preference = availableProducts.filter((product) => product.displayGroup === "preference");
  renderProductGroup("#basicProducts", basic, true);
  renderProductGroup("#personalProducts", personal, false);
  renderProductGroup("#preferenceProducts", preference, false);

  document.querySelectorAll("[data-goal-index]").forEach((button) => {
    button.addEventListener("click", () => {
      document.querySelectorAll("[data-goal-index]").forEach((item) => item.classList.remove("is-active"));
      button.classList.add("is-active");
      const option = goalOptions[Number(button.dataset.goalIndex)];
      const selectedIngredients = option?.ingredients || [];
      const selectedProducts = availableProducts.filter((product) => {
        if (product.displayGroup !== "personal") return false;
        const ingredientMatch = (product.recommendedIngredients || []).some((value) => selectedIngredients.some((ingredient) => textMatch(value, ingredient)));
        const keywordMatch = (product.targetKeywords || []).some((keyword) => textMatch(keyword, option?.label));
        return ingredientMatch || keywordMatch;
      });
      renderProductGroup("#personalProducts", selectedProducts, false);
      document.querySelector("#personalProducts")?.scrollIntoView({ behavior:"smooth", block:"center" });
    });
  });

  function renderProductGroup(selector, groupProducts, includeCamera) {
    const rows = [];
    if (includeCamera) rows.push(renderCameraRow());
    rows.push(...groupProducts.map(renderProductRow));
    document.querySelector(selector).innerHTML = rows.length
      ? '<div class="shop-head"><span>제품</span><span>이유</span><span>가격</span><span>구매</span></div>' + rows.join("")
      : '<div class="empty-products">운영자가 등록한 상품이 없습니다.</div>';
  }

  function renderProductRow(product) {
    const reason = product.reason || getIngredientReason((product.recommendedIngredients || [])[0] || product.name);
    const image = product.imageUrl ? '<img src="' + escapeHtml(product.imageUrl) + '" alt="' + escapeHtml(product.name) + '">' : '<div class="shop-placeholder">NO IMAGE</div>';
    return '<article class="shop-row"><div class="shop-product">' + image + '<div><strong>' + escapeHtml(product.name) + '</strong><span class="muted">' + escapeHtml(product.brand || '') + '</span></div></div><div class="shop-reason">' + escapeHtml(reason) + '</div><div class="shop-price">' + Number(product.salePrice || 0).toLocaleString('ko-KR') + '원</div><button class="button" type="button" data-cart-product="' + escapeHtml(product.productId) + '">장바구니</button></article>';
  }

  function renderCameraRow() {
    return '<article class="shop-row"><div class="shop-product"><div class="shop-camera-visual"></div><div><strong>' + escapeHtml(camera.name || '홍채촬영도구') + '</strong><span class="muted">IRIS CAMERA</span></div></div><div class="shop-reason">' + escapeHtml(camera.description || '정확한 홍채 사진 촬영을 위한 기본 도구입니다.') + '</div><div class="shop-price">' + Number(camera.price || 120000).toLocaleString('ko-KR') + '원</div><button class="button" type="button" data-cart-camera="1">장바구니</button></article>';
  }

  function getIngredientReason(ingredient) {
    const configured = Object.entries(operatorSettings.ingredientReasons || {}).find(([name]) => textMatch(name, ingredient));
    if (configured?.[1]) return configured[1];
    const source = primary.find((item) => (item.ingredients || []).some((value) => textMatch(value, ingredient)));
    if (!source) return ingredient + ' 성분의 함량과 구성을 우선 비교해 보세요.';
    const findings = (source.matchedFindings || []).map((item) => item.label || item.title || item.name).filter(Boolean).slice(0, 3);
    if (findings.length) return findings.join(', ') + ' 항목이 확인되어 ' + ingredient + ' 성분을 우선 비교합니다.';
    const sourceGoals = (source.goals || []).slice(0, 2);
    if (sourceGoals.length) return sourceGoals.join(', ') + '을 위한 비교 성분입니다.';
    return (source.title || '현재 관리 목적') + '과 관련해 우선 비교하는 성분입니다.';
  }

  prefillConsultForm();

  consultForm.addEventListener("submit", async (event) => {
    event.preventDefault();
    const data = Object.fromEntries(new FormData(event.currentTarget).entries());
    const requests = readJson("irisShoppingConsultRequests", []);
    requests.push({ id:"C" + Date.now(), category:"상담요청", ...data, status:"접수", createdAt:new Date().toISOString() });
    localStorage.setItem("irisShoppingConsultRequests", JSON.stringify(requests));
    const sent = await sendConsultRequest(data);
    if (sent) {
      event.currentTarget.elements.memo.value = "";
      prefillConsultForm();
      document.querySelector("#consultStatus").textContent = "접수되었습니다.";
    } else {
      document.querySelector("#consultStatus").textContent = "전송에 실패했습니다.";
    }
  });

  async function sendConsultRequest(data) {
    if (!consultScriptUrl) return false;
    const payload = {
      type: "상담",
      name: data.name || "",
      phone: data.phone || "",
      email: data.email || "",
      message: data.memo || "",
      page: location.href,
      createdAt: new Date().toISOString()
    };
    try {
      const response = await fetch(consultScriptUrl, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });
      const result = await response.json().catch(() => ({}));
      return response.ok && (result.success === true || result.saved === true);
    } catch (_) {
      const failed = readJson("irisShoppingConsultFailedQueue", []);
      failed.push({ ...data, createdAt:new Date().toISOString() });
      localStorage.setItem("irisShoppingConsultFailedQueue", JSON.stringify(failed));
      return false;
    }
  }

  document.addEventListener("click", (event) => {
    const productButton = event.target.closest("[data-cart-product]");
    if (productButton) {
      const product = availableProducts.find((item) => item.productId === productButton.dataset.cartProduct);
      if (product) addToCart(product);
      return;
    }
    const cameraButton = event.target.closest("[data-cart-camera]");
    if (cameraButton) {
      addToCart({
        productId:"iris-camera",
        name:camera.name || "홍채촬영도구",
        brand:"IRIS CAMERA",
        description:camera.description || "정확한 홍채 사진 촬영을 위한 기본 도구입니다.",
        reason:camera.description || "정확한 홍채 사진 촬영을 위한 기본 도구입니다.",
        imageUrl:"",
        salePrice:Number(camera.price || 120000),
        stock:99
      });
    }
  });

  function addToCart(product) {
    const cart = readJson("irisShoppingCart", []);
    const existing = cart.find((item) => item.productId === product.productId);
    if (existing) {
      existing.quantity = Number(existing.quantity || 1) + 1;
      if (!existing.cartItemId) existing.cartItemId = makeCartItemId(product);
    } else {
      cart.push({
        cartItemId:makeCartItemId(product),
        productId:product.productId,
        name:product.name,
        brand:product.brand || "",
        description:product.description || product.reason || "",
        reason:product.reason || "",
        imageUrl:product.imageUrl || "",
        salePrice:Number(product.salePrice || 0),
        quantity:1,
        addedAt:new Date().toISOString()
      });
    }
    localStorage.setItem("irisShoppingCart", JSON.stringify(cart));
    location.href = "cart.html";
  }

  function makeCartItemId(product) {
    if (product.productId === "iris-camera") return "CART-iris-camera";
    return "CART-" + String(product.productId || product.name || "item").replace(/[^a-zA-Z0-9가-힣_-]/g, "") + "-" + Date.now() + "-" + Math.random().toString(36).slice(2, 7);
  }

  function readJson(key,fallback){ try{return JSON.parse(localStorage.getItem(key)||"null")??fallback}catch(_){return fallback} }
  function prefillConsultForm(){
    if(!consultForm)return;
    const member = currentMemberFromStorage();
    const phone = normalizePhone(localStorage.getItem("irisMappingSession") || consultForm.elements.phone.value || member.phone || "");
    if(member.name && !consultForm.elements.name.value) consultForm.elements.name.value = member.name;
    if(phone && !consultForm.elements.phone.value) consultForm.elements.phone.value = phone;
    if(member.email && !consultForm.elements.email.value) consultForm.elements.email.value = member.email;
  }
  function currentMemberFromStorage(){
    const phone = normalizePhone(localStorage.getItem("irisMappingSession") || consultForm?.elements?.phone?.value || "");
    const savedCustomer = readJson("irisShoppingOrderCustomer", {});
    if(!phone)return savedCustomer || {};
    const users = readJson("irisMappingUsers", {});
    if(users[phone])return mergeMemberInfo(savedCustomer, users[phone]);
    const variants = phoneVariants(phone);
    const matchedUser = Object.entries(users).find(([key,user]) => {
      const stored = new Set([...phoneVariants(key), ...phoneVariants(user?.phone)]);
      return variants.some((value) => stored.has(value));
    })?.[1] || {};
    return mergeMemberInfo(savedCustomer, matchedUser);
  }
  function mergeMemberInfo(savedCustomer = {}, member = {}){
    return {
      ...savedCustomer,
      ...member,
      name: member.name || savedCustomer.name || "",
      phone: member.phone || savedCustomer.phone || "",
      email: member.email || savedCustomer.email || "",
      address: member.address || savedCustomer.address || "",
      memo: member.memo || savedCustomer.memo || ""
    };
  }
  function normalizePhone(value){
    let digits=String(value||"").replace(/\D/g,"");
    if(digits.startsWith("0082"))digits=digits.slice(4);
    if(digits.startsWith("82"))digits=digits.slice(2);
    if(digits.length===10&&digits.startsWith("10"))digits=`0${digits}`;
    return digits;
  }
  function phoneVariants(value){
    const normalized=normalizePhone(value);
    const withoutLeadingZero=normalized.replace(/^0+/,"");
    return [normalized, withoutLeadingZero].filter(Boolean);
  }
  window.addEventListener("irisMemberProfileRestored", prefillConsultForm);
  window.addEventListener("storage", (event) => {
    if(["irisMappingUsers","irisMappingSession","irisShoppingOrderCustomer"].includes(event.key)) prefillConsultForm();
  });
  function textMatch(a,b){ const x=normalize(a),y=normalize(b); return x && y && (x.includes(y)||y.includes(x)); }
  function normalize(value){ return String(value||"").toLowerCase().replace(/\s+/g,"").replace(/[·ㆍ/()\-]/g,""); }
  function unique(values){ return [...new Set((values||[]).map((value)=>String(value||"").trim()).filter(Boolean))]; }
  function escapeHtml(value){ return String(value??"").replace(/[&<>"']/g,(char)=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[char])); }
</script>
<script src="site-navigation.js?v=20260630-marker-sync-1"></script>
</body>
</html>
