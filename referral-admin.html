<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>회원DB | IRIS MAPPING LAB</title>
  <link rel="stylesheet" href="site-navigation.css?v=20260624-single-bg-1">
  <style>
    :root{color-scheme:dark;--line:#294b5e;--text:#f5f7fa;--muted:#9eb0bd;--cyan:#36d8d0;--gold:#e8b74c}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:linear-gradient(180deg,#07111a,#030609);color:var(--text);font-family:Arial,"Noto Sans KR",sans-serif}
    .page{width:min(1180px,100%);margin:auto;padding:24px 16px}
    header{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:14px}
    .brand{color:var(--cyan);font-size:13px;font-weight:900;letter-spacing:.08em}
    h1{margin:8px 0 0;font-size:clamp(26px,4vw,40px)}
    h2{margin:0;color:var(--gold);font-size:20px}
    .button{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:0 14px;border:1px solid var(--line);border-radius:7px;color:var(--text);background:#0b1522;text-decoration:none;font-weight:800;cursor:pointer}
    .button.primary{color:#031312;background:var(--cyan);border-color:var(--cyan)}
    .status{margin:0 0 16px;color:var(--muted);line-height:1.65}
    .status strong{color:var(--cyan)}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:16px 0}
    .card{padding:18px;border:1px solid var(--line);border-radius:8px;background:rgba(10,20,32,.94)}
    .metric strong{display:block;color:var(--muted);font-size:13px}
    .metric b{display:block;margin-top:8px;color:var(--cyan);font-size:26px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:14px}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:8px}
    table{width:100%;min-width:980px;border-collapse:collapse;background:#07111b}
    th,td{padding:12px;border-bottom:1px solid #203b4b;text-align:left;vertical-align:top;line-height:1.5}
    th{color:#b9c9d3;background:#091722;font-size:13px;white-space:nowrap}
    tr:last-child td{border-bottom:0}
    .muted{color:var(--muted)}
    .pill{display:inline-flex;margin:2px 4px 2px 0;padding:3px 7px;border:1px solid #31556a;border-radius:999px;color:#c9d8e0;font-size:12px}
    .empty{padding:24px;color:var(--muted);text-align:center}
    @media(max-width:760px){header{align-items:stretch;flex-direction:column}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.page{padding:16px 10px}}
    @media(max-width:520px){.grid{grid-template-columns:1fr}.button{width:100%}}
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div>
        <div class="brand">IRIS MAPPING LAB</div>
        <h1>회원DB</h1>
      </div>
      <a class="button" href="mypage.html">마이페이지</a>
    </header>

    <p id="ownerStatus" class="status">회원DB 기준을 확인하고 있습니다.</p>
    <section id="metrics" class="grid" aria-label="추천 회원 현황"></section>

    <section class="card">
      <div class="toolbar">
        <h2>내 추천 회원</h2>
        <button id="refreshButton" class="button primary" type="button">새로고침</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>회원</th>
              <th>연락처</th>
              <th>가입정보</th>
              <th>홍채정보</th>
              <th>관찰 요약</th>
              <th>최근 저장</th>
            </tr>
          </thead>
          <tbody id="memberRows"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="firebase-config.js?v=20260710-referrer-required-2"></script>
  <script src="firebase-sync.js?v=20260710-referrer-required-2"></script>
  <script src="referral-admin.js?v=20260710-member-db-racefix-1"></script>
  <script src="site-navigation.js?v=20260710-referrer-required-2"></script>
</body>
</html>
