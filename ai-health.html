  <script>
    const insuranceViewButtons=[...document.querySelectorAll("[data-insurance-view]")];
    const insurancePageStateKey="irisAiInsuranceActiveView";
    const insuranceViewMeta={
      insuranceConsultPanel:["AI 보험상담","고객의 걱정과 보장 빈틈을 정리합니다."],
      universeInsurancePanel:["유니버스 PDF · 결과","병력분석 PDF와 문진, 홍채 결과를 함께 확인합니다."]
    };
    const normalizeInsuranceView=(viewId)=>insuranceViewMeta[viewId]?viewId:"insuranceConsultPanel";
    function readInsuranceJson(key){
      try{return JSON.parse(localStorage.getItem(key)||"null")}
      catch(_){return null}
    }
    function escapeInsuranceHtml(value){
      return String(value??"").replace(/[&<>"']/g,(char)=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[char]));
    }
    function currentInsurancePhone(){
      const raw=localStorage.getItem("irisMappingSession")||"";
      let digits=String(raw).replace(/\D/g,"");
      if(digits.length===10&&digits.startsWith("10"))digits=`0${digits}`;
      return digits;
    }
    function renderHealthBoxPanel(){
      const phone=currentInsurancePhone();
      const vip=readInsuranceJson(phone?`irisVipMembership:${phone}`:"irisVipMembership")||{};
      const subscription=readInsuranceJson(phone?`irisSubscription:${phone}`:"irisSubscription")||{};
      const box=vip.healthBox||{};
      const history=readInsuranceJson(phone?`irisHealthBoxHistory:${phone}`:"")||[];
      const status=document.querySelector("#healthBoxStatus");
      const items=document.querySelector("#healthBoxItems");
      const memo=document.querySelector("#healthBoxMemo");
      const active=Boolean(vip.active);
      status.innerHTML=active
        ? `<p><strong>VIP 활성화 완료</strong><br>건강박스 1회 무료 제공 혜택이 지급되었습니다.</p><p>상태: <strong>${escapeInsuranceHtml(box.status||"미사용")}</strong></p>`
        : `<p><strong>VIP 혜택 대기</strong><br>유니버스 PDF 업로드 완료 후 건강박스 혜택이 활성화됩니다.</p>`;
      const boxItems=Array.isArray(box.items)&&box.items.length?box.items:(Array.isArray(subscription.box)?subscription.box:[]);
      items.innerHTML=boxItems.length
        ? boxItems.map((item)=>`<span>${escapeInsuranceHtml(item)}</span>`).join("")
        : `<p class="ai-disclaimer">운영자가 회원 상태를 참고하여 건강식품, 건강차, 건강간식, 건강도서, 체험권, 할인권 등에서 직접 구성합니다.</p>`;
      memo.innerHTML=`<p>${escapeInsuranceHtml(box.composition||"운영자 직접 구성")}</p><p class="ai-disclaimer">건강박스 이력 ${history.length}회 · 현재 플랜 ${escapeInsuranceHtml(subscription.plan||"미기록")}</p>`;
    }
    function showInsuranceView(viewId,options={}){
      const nextView=normalizeInsuranceView(viewId);
      document.querySelectorAll(".insurance-workspace").forEach((panel)=>{ panel.hidden=panel.id!==nextView; });
      insuranceViewButtons.forEach((tab)=>tab.classList.toggle("is-active",tab.dataset.insuranceView===nextView));
      document.querySelector("#insurancePageTitle").textContent=insuranceViewMeta[nextView][0];
      document.querySelector("#insurancePageSubtitle").textContent=insuranceViewMeta[nextView][1];
      if(nextView==="universeInsurancePanel"){
        const frame=document.querySelector("#universeInsuranceFrame");
        if(frame&&!frame.getAttribute("src"))frame.src=frame.dataset.src;
      }
      if(options.persist!==false)localStorage.setItem(insurancePageStateKey,nextView);
      if(options.history!==false){
        const hash=nextView==="universeInsurancePanel"?"#universe":"";
        history.replaceState({currentPage:nextView}, "", `${location.pathname}${hash}`);
      }
    }
    insuranceViewButtons.forEach((button)=>button.addEventListener("click",()=>showInsuranceView(button.dataset.insuranceView)));
    window.addEventListener("message",(event)=>{
      if(event.data?.type==="iris:navigate"&&event.data?.page==="healthbox")showInsuranceView("universeInsurancePanel");
    });
    const initialView=location.hash==="#universe"||location.hash==="#healthbox"?"universeInsurancePanel":localStorage.getItem(insurancePageStateKey);
    showInsuranceView(initialView,{history:false});
  </script>
  <script>
    const chatWindow = document.querySelector("#chatWindow");
    const choiceBox = document.querySelector("#choiceBox");
    const chatStatus = document.querySelector("#chatStatus");
    const freeInput = document.querySelector("#freeInput");
    const aiSummary = document.querySelector("#aiSummary");

    const profileFields = {
      phone: document.querySelector("#profilePhone"),
      name: document.querySelector("#profileName"),
      gender: document.querySelector("#profileGender"),
      age: document.querySelector("#profileAge"),
      job: document.querySelector("#profileJob")
    };

    const state = {
      profile: {},
      answers: {},
      flow: [],
      currentIndex: -1,
      createdAt: "",
      consultId: "",
      status: "",
      draftQuestionKey: "",
      draftAnswer: null
    };

    function normalizePhone(value) {
      return String(value || "").replace(/[^0-9]/g, "");
    }

    function storageKey(phone) {
      const cleanPhone = normalizePhone(phone);
      return cleanPhone ? `irisAiInsuranceConsult_${cleanPhone}` : "irisAiInsuranceConsult";
    }

    function generateConsultId() {
      const now = new Date();
      return (
        "IN" +
        now.getFullYear() +
        String(now.getMonth() + 1).padStart(2, "0") +
        String(now.getDate()).padStart(2, "0") +
        String(now.getHours()).padStart(2, "0") +
        String(now.getMinutes()).padStart(2, "0") +
        String(now.getSeconds()).padStart(2, "0")
      );
    }

    function getAgeGroup(age) {
      const n = Number(age);
      if (!n) return "미확인";
      if (n <= 34) return "청년";
      if (n <= 49) return "중년 전기";
      if (n <= 64) return "중년 후기";
      return "노년";
    }

    function collectProfile() {
      const profile = {};
      Object.entries(profileFields).forEach(([key, field]) => {
        profile[key] = field.value.trim();
      });
      profile.phone = normalizePhone(profile.phone);
      profile.ageGroup = getAgeGroup(profile.age);
      return profile;
    }

    function addMessage(sender, text) {
      const item = document.createElement("div");
      item.className = `message ${sender}`;
      item.textContent = text;
      chatWindow.appendChild(item);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function clearChoices() {
      choiceBox.innerHTML = "";
    }

    function showChoices(options, onPick, multiSelect = false, initialValues = [], onDraft = null) {
      clearChoices();

      if (!multiSelect) {
        options.forEach((option) => {
          const button = document.createElement("button");
          button.className = "choice-btn";
          button.type = "button";
          button.textContent = option;
          button.addEventListener("click", () => onPick(option));
          choiceBox.appendChild(button);
        });
        return;
      }

      const selected = new Set(Array.isArray(initialValues) ? initialValues : []);

      options.forEach((option) => {
        const button = document.createElement("button");
        button.className = "choice-btn";
        button.type = "button";
        button.textContent = option;
        if (selected.has(option)) button.classList.add("is-selected");

        button.addEventListener("click", () => {
          if (selected.has(option)) {
            selected.delete(option);
            button.classList.remove("is-selected");
            if (onDraft) onDraft([...selected]);
            return;
          }

          if (option.includes("없음") || option.includes("해당 없음") || option.includes("잘 모름")) {
            selected.clear();
            [...choiceBox.querySelectorAll(".choice-btn")].forEach((item) => item.classList.remove("is-selected"));
          } else {
            [...selected].forEach((value) => {
              if (value.includes("없음") || value.includes("해당 없음") || value.includes("잘 모름")) selected.delete(value);
            });
            [...choiceBox.querySelectorAll(".choice-btn")].forEach((item) => {
              if (item.textContent.includes("없음") || item.textContent.includes("해당 없음") || item.textContent.includes("잘 모름")) {
                item.classList.remove("is-selected");
              }
            });
          }

          selected.add(option);
          button.classList.add("is-selected");
          if (onDraft) onDraft([...selected]);
        });

        choiceBox.appendChild(button);
      });

      const doneButton = document.createElement("button");
      doneButton.className = "choice-btn choice-done-btn";
      doneButton.type = "button";
      doneButton.textContent = "선택 완료";
      doneButton.addEventListener("click", () => {
        const values = [...selected];
        onPick(values.length ? values : ["선택 없음"]);
      });
      choiceBox.appendChild(doneButton);
    }

    function businessFlow() {
      return [

    function needsBusinessQuestions() {
      const type = state.answers.customerType;
      return type === "사업자" || type === "개인 + 사업자";
    }

    function appendBusinessFlowIfNeeded() {
      if (needsBusinessQuestions() && !state.flow.some((item) => item.key === "businessType")) {
        state.flow.splice(state.flow.length, 0, ...businessFlow());
      }
    }

    function includesAny(value, keys) {
      const list = Array.isArray(value) ? value : [value];
      return keys.some((key) => list.some((item) => String(item).includes(key)));
    }

    function buildRecommendation() {
      const a = state.answers;
      const priorities = [];
      const reasons = [];

      function add(title, reason) {
        if (!priorities.some((item) => item.title === title)) {
          priorities.push({ title, reason });
        }
      }

      if (includesAny(a.personalRiskConcern, ["사망"]) || includesAny(a.familyResponsibility, ["사망", "미성년", "배우자", "교육비"])) {
        add("사망보장·가족 생활비 대비", "사망 후 자녀·배우자 생활비 공백 가능성이 확인됨");
      }

      if (includesAny(a.personalRiskConcern, ["암"]) || includesAny(a.diseaseHistory, ["암 가족력", "용종", "결절"]) || !includesAny(a.currentInsurance, ["암보험"])) {
        add("암진단비 점검", "암 걱정·가족력·용종/결절 이력 또는 암보장 공백 여부 확인 필요");
      }

      if (includesAny(a.personalRiskConcern, ["뇌"]) || includesAny(a.diseaseHistory, ["뇌질환"])) {
        add("뇌질환 진단비", "뇌질환 걱정 또는 가족력 확인");
      }

      if (includesAny(a.personalRiskConcern, ["심장"]) || includesAny(a.diseaseHistory, ["심장질환"])) {
        add("심장질환 진단비", "심장질환 걱정 또는 가족력 확인");
      }

      if (includesAny(a.caregiver, ["간병할 사람 없음"]) || includesAny(a.personalRiskConcern, ["간병", "치매"]) || includesAny(a.diseaseHistory, ["치매"])) {
        add("간병·치매·장기요양 대비", "간병 공백 또는 치매·간병 걱정 확인");
      }

      if (includesAny(a.incomeLoss, ["크게", "조금"]) || includesAny(a.personalRiskConcern, ["생활비"])) {
        add("질병·상해 시 생활비 보완", "입원·치료 중 소득 감소 가능성 확인");
      }

      if (includesAny(a.coveragePreference, ["수술비"]) || includesAny(a.personalRiskConcern, ["수술비"])) {
        add("수술비 보완", "수술비 보장 선호 또는 수술비 걱정 확인");
      }

      if (includesAny(a.coveragePreference, ["실손"]) || !includesAny(a.currentInsurance, ["실손"])) {
        add("실손 보완 또는 의료비 공백 점검", "실손 준비 여부와 의료비 부담 확인 필요");
      }

      if (includesAny(a.accidentRisk, ["운전", "오토바이", "교통사고"]) || includesAny(a.coveragePreference, ["운전자"])) {
        add("운전자보험·교통사고 대비", "운전 빈도 또는 교통사고 걱정 확인");
      }

      if (includesAny(a.accidentRisk, ["위험한", "기계", "건설", "골절", "상해"]) || includesAny(a.coveragePreference, ["상해"])) {
        add("상해·골절·후유장해 대비", "직업·생활상 상해 위험 가능성 확인");
      }

      if (needsBusinessQuestions()) {
        if (includesAny(a.businessRisks, ["화재"])) add("사업장 화재보험", "사업장 화재 위험 확인");
        if (includesAny(a.businessRisks, ["배상책임", "식중독", "고객 민원", "정보유출"])) add("배상책임보험", "고객·거래처·시설 관련 배상 위험 확인");
        if (includesAny(a.businessRisks, ["산재", "근재", "직원 단체상해"]) || !includesAny(a.employeeCount, ["0명"])) add("직원 단체상해·산재/근재 보완", "직원 사고와 사업장 책임 위험 확인");
        if (includesAny(a.businessFinance, ["세금", "퇴직금", "상속", "증여", "가업", "절세", "대표 유고"])) add("GFC 사업자 재무·승계 상담", "세금·퇴직금·상속·증여·대표 유고 관련 상담 필요");
      }

      if (!priorities.length) {
        add("기본 보장 점검", "현재 걱정이 명확하지 않아 실손·암·뇌·심장·상해 기본 공백 점검 필요");
      }

      return priorities;
    }

    function saveProgress(status = "inProgress") {
      if (!state.profile || !state.profile.phone) {
        chatStatus.textContent = "전화번호를 먼저 입력해야 저장할 수 있습니다.";
        return null;
      }

      state.status = status;
      const result = {
        createdAt: state.createdAt || new Date().toISOString(),
        savedAt: new Date().toISOString(),
        status,
        consultId: state.consultId || "",
        profile: state.profile,
        answers: state.answers,
        currentIndex: state.currentIndex,
        draftQuestionKey: state.draftQuestionKey,
        draftAnswer: state.draftAnswer,
        recommendation: buildRecommendation(),
        note: "본 결과는 보험 가입 가능 여부나 상품 추천 확정이 아니라 상담 방향을 정리한 참고자료입니다."
      };

      localStorage.setItem(storageKey(state.profile.phone), JSON.stringify(result));
      return result;
    }

    function fillProfileFromSaved(profile = {}) {
      Object.entries(profileFields).forEach(([key, field]) => {
        if (field && profile[key] !== undefined && profile[key] !== null) {
          field.value = profile[key];
        }
      });
    }

    function rebuildAnsweredChat(saved) {
      chatWindow.innerHTML = "";
      addMessage("ai", "저장된 보험 상담을 불러왔습니다. 이어서 진행할 수 있습니다.");

      const flow = state.flow || [];
      const answers = saved.answers || {};
      flow.forEach((question, index) => {
        if (index <= saved.currentIndex && answers[question.key] !== undefined) {
          const answer = Array.isArray(answers[question.key]) ? answers[question.key].join(", ") : answers[question.key];
          addMessage("ai", question.text);
          addMessage("user", answer);
        }
      });
    }

    function loadConsult() {
      const phone = normalizePhone(profileFields.phone ? profileFields.phone.value : "");
      if (!phone) {
        chatStatus.textContent = "먼저 전화번호를 입력해 주세요.";
        if (profileFields.phone) profileFields.phone.focus();
        return;
      }

      const savedRaw = localStorage.getItem(storageKey(phone));
      if (!savedRaw) {
        chatStatus.textContent = "해당 전화번호로 저장된 보험 상담이 없습니다.";
        return;
      }

      try {
        const saved = JSON.parse(savedRaw);
        state.profile = saved.profile || collectProfile();
        state.profile.phone = phone;
        state.createdAt = saved.createdAt || new Date().toISOString();
        state.consultId = saved.consultId || generateConsultId();
        state.answers = saved.answers || {};
        state.currentIndex = Number.isInteger(saved.currentIndex) ? saved.currentIndex : -1;
        state.status = saved.status || "inProgress";
        state.draftQuestionKey = saved.draftQuestionKey || "";
        state.draftAnswer = saved.draftAnswer ?? null;
        state.flow = buildFlow(state.profile);
        if (state.answers.customerType === "사업자" || state.answers.customerType === "개인 + 사업자") {
          state.flow.push(...businessFlow());
        }

        fillProfileFromSaved(state.profile);
        rebuildAnsweredChat(saved);

        const hasCurrentDraft = state.draftQuestionKey && state.flow[state.currentIndex]?.key === state.draftQuestionKey;
        const nextIndex = hasCurrentDraft ? state.currentIndex : state.currentIndex + 1;
        if (nextIndex >= state.flow.length || saved.status === "completed") {
          chatStatus.textContent = "저장된 보험 상담은 완료 상태입니다.";
          finishConsult();
          return;
        }

        state.currentIndex = nextIndex - 1;
        chatStatus.textContent = "저장된 보험 상담을 불러왔습니다. 이어서 진행하세요.";
        nextQuestion();
      } catch (error) {
        chatStatus.textContent = "저장된 보험 상담을 불러오는 중 오류가 발생했습니다.";
      }
    }

    function nextQuestion() {
      appendBusinessFlowIfNeeded();
      state.currentIndex += 1;

      if (state.currentIndex >= state.flow.length) {
        finishConsult();
        return;
      }

      const question = state.flow[state.currentIndex];
      addMessage("ai", question.text);
      const draftAnswer = state.draftQuestionKey === question.key ? state.draftAnswer : state.answers[question.key];
      freeInput.value = typeof draftAnswer === "string" && !question.options.includes(draftAnswer) ? draftAnswer : "";
      showChoices(question.options, (answer) => {
        recordAnswer(question, answer);
      }, Boolean(question.multiSelect), draftAnswer, (draftValues) => {
        state.draftQuestionKey = question.key;
        state.draftAnswer = draftValues;
        saveProgress("inProgress");
        chatStatus.textContent = "현재 선택 내용 자동 저장됨";
      });
    }

    function recordAnswer(question, answer) {
      const displayAnswer = Array.isArray(answer) ? answer.join(", ") : answer;
      addMessage("user", displayAnswer);
      state.answers[question.key] = answer;
      state.draftQuestionKey = "";
      state.draftAnswer = null;

      saveProgress("inProgress");
      chatStatus.textContent = "보험 상담 진행 중 · 중간 저장됨";
      nextQuestion();
    }

    function finishConsult() {
      clearChoices();
      const result = saveProgress("completed");
      const priorities = buildRecommendation();

      addMessage("ai", "보험 상담 방향이 정리되었습니다. 본 결과는 상품 확정이 아니라 상담 우선순위 참고자료입니다.");

      const priorityHtml = priorities.map((item, index) => {
        return `<li><strong>${index + 1}순위 · ${item.title}</strong><br>${item.reason}</li>`;
      }).join("");

      aiSummary.classList.add("is-visible");
      aiSummary.innerHTML = `
        <h3>AI 보험상담 요약</h3>
        <p><strong>상담번호:</strong> ${state.consultId || "미기록"}</p>
        <p><strong>고객 유형:</strong> ${state.answers.customerType || "미기록"}</p>
        <p><strong>걱정 대상:</strong> ${Array.isArray(state.answers.worryTarget) ? state.answers.worryTarget.join(", ") : (state.answers.worryTarget || "미기록")}</p>
        <p><strong>주요 걱정:</strong> ${Array.isArray(state.answers.personalRiskConcern) ? state.answers.personalRiskConcern.join(", ") : (state.answers.personalRiskConcern || "미기록")}</p>
        <p><strong>예산:</strong> ${state.answers.budget || "미기록"}</p>
        <h3>상담 설계 방향</h3>
        <ul class="priority-list">${priorityHtml}</ul>
        <p><strong>저장 위치:</strong> localStorage → ${storageKey(state.profile.phone)}</p>
        <p>본 내용은 보험 가입 가능 여부나 상품 추천 확정이 아니라 고객의 걱정과 보장 공백을 정리한 상담 참고자료입니다.</p>
      `;

      chatStatus.textContent = "보험 상담 완료 및 저장됨";
    }

    document.querySelector("#startConsultButton").addEventListener("click", () => {
      insuranceAutoSaveSuppressed = false;
      state.profile = collectProfile();

      if (!state.profile.phone) {
        chatStatus.textContent = "전화번호는 필수입니다.";
        profileFields.phone.focus();
        return;
      }

      state.createdAt = new Date().toISOString();
      state.consultId = generateConsultId();
      state.answers = {};
      state.flow = buildFlow(state.profile);
      state.currentIndex = -1;
      state.status = "inProgress";
      state.draftQuestionKey = "";
      state.draftAnswer = null;
      chatWindow.innerHTML = "";
      aiSummary.classList.remove("is-visible");
      aiSummary.innerHTML = "";
      chatStatus.textContent = "보험 상담 진행 중";

      addMessage("ai", `안녕하세요${state.profile.name ? ", " + state.profile.name + "님" : ""}.\n보험상품을 먼저 고르는 것이 아니라, 고객님의 걱정과 보장 공백을 먼저 정리하겠습니다.`);
      nextQuestion();
    });

    document.querySelector("#saveConsultButton").addEventListener("click", () => {
      if (!state.profile || !state.profile.phone) {
        state.profile = collectProfile();
        if (!state.profile.phone) {
          chatStatus.textContent = "전화번호를 먼저 입력해 주세요.";
          profileFields.phone.focus();
          return;
        }
      }

      if (!state.createdAt) state.createdAt = new Date().toISOString();
      if (!state.consultId) state.consultId = generateConsultId();

      const saved = saveProgress("manualSave");
      if (saved) {
        chatStatus.textContent = "현재 보험 상담이 저장되었습니다.";
        addMessage("ai", "현재 보험 상담 내용이 저장되었습니다. 나중에 전화번호로 다시 불러올 수 있습니다.");
      }
    });

    document.querySelector("#loadConsultButton").addEventListener("click", () => {
      loadConsult();
    });

    document.querySelector("#resetConsultButton").addEventListener("click", () => {
      chatWindow.innerHTML = "";
      clearChoices();
      freeInput.value = "";
      aiSummary.classList.remove("is-visible");
      aiSummary.innerHTML = "";
      chatStatus.textContent = "전화번호를 입력하고 보험상담 시작을 눌러주세요.";

      insuranceAutoSaveSuppressed = true;
      state.profile = collectProfile();
      state.answers = {};
      state.flow = [];
      state.currentIndex = -1;
      state.createdAt = "";
      state.consultId = "";
      state.status = "profileDraft";
      state.draftQuestionKey = "";
      state.draftAnswer = null;
    });

    document.querySelector("#sendFreeButton").addEventListener("click", () => {
      const value = freeInput.value.trim();
      if (!value) return;

      addMessage("user", value);
      const current = state.flow[state.currentIndex];
      if (current) state.answers[current.key] = value;
      state.draftQuestionKey = "";
      state.draftAnswer = null;

      saveProgress("inProgress");
      chatStatus.textContent = "보험 상담 진행 중 · 중간 저장됨";
      freeInput.value = "";
      nextQuestion();
    });

    let insuranceAutoSaveTimer = null;
    let insuranceAutoSaveSuppressed = false;

    function autoSaveInsuranceDraft() {
      clearTimeout(insuranceAutoSaveTimer);
      if (insuranceAutoSaveSuppressed) return;
      const profile = collectProfile();
      if (!profile.phone) return;
      state.profile = { ...state.profile, ...profile };
      if (!state.createdAt) state.createdAt = new Date().toISOString();
      if (!state.consultId) state.consultId = generateConsultId();
      saveProgress(state.status || (state.currentIndex >= 0 ? "inProgress" : "profileDraft"));
    }

    function scheduleInsuranceAutoSave() {
      insuranceAutoSaveSuppressed = false;
      clearTimeout(insuranceAutoSaveTimer);
      insuranceAutoSaveTimer = setTimeout(autoSaveInsuranceDraft, 300);
    }

    Object.values(profileFields).forEach((field) => {
      field.addEventListener("input", scheduleInsuranceAutoSave);
      field.addEventListener("change", scheduleInsuranceAutoSave);
    });

    freeInput.addEventListener("input", () => {
      const current = state.flow[state.currentIndex];
      if (current) {
        state.draftQuestionKey = current.key;
        state.draftAnswer = freeInput.value;
      }
      scheduleInsuranceAutoSave();
    });

    window.addEventListener("pagehide", autoSaveInsuranceDraft);
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden") autoSaveInsuranceDraft();
    });

    profileFields.phone.addEventListener("blur", () => {
      const phone = normalizePhone(profileFields.phone.value);
      if (!phone) return;

      const saved = localStorage.getItem(storageKey(phone));
      if (saved) {
        chatStatus.textContent = "이 전화번호로 저장된 보험 상담이 있습니다. 불러오기를 누르면 이어서 진행할 수 있습니다.";
      }
    });

    const loggedInPhone = normalizePhone(localStorage.getItem("irisMappingSession"));
    if (loggedInPhone) {
      profileFields.phone.value = loggedInPhone;
      const users = JSON.parse(localStorage.getItem("irisMappingUsers") || "{}");
      const loggedInUser = users[loggedInPhone];
      if (loggedInUser?.name && !profileFields.name.value) profileFields.name.value = loggedInUser.name;
      if (localStorage.getItem(storageKey(loggedInPhone))) {
        loadConsult();
      } else {
        state.profile = collectProfile();
        chatStatus.textContent = "로그인 계정으로 작성 내용이 자동 저장됩니다.";
      }
    }
  </script>
  <script src="site-navigation.js?v=20260630-marker-sync-1"></script>
</body>
</html>
